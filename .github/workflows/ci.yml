name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      # Build packages first so downstream tests (e.g. react consuming core) see fresh dist/
      - run: pnpm build
      - run: pnpm test
      - run: pnpm check:api-coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage
